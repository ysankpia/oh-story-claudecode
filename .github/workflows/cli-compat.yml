name: Agent CLI compatibility

on:
  push:
    branches: [main]
    paths:
      - '.agents/**'
      - '.claude-plugin/**'
      - '.factory/**'
      - '.factory-plugin/**'
      - 'droids/**'
      - '.github/workflows/cli-compat.yml'
      - 'scripts/**'
      - 'skills/**'
  pull_request:
    paths:
      - '.agents/**'
      - '.claude-plugin/**'
      - '.factory/**'
      - '.factory-plugin/**'
      - 'droids/**'
      - '.github/workflows/cli-compat.yml'
      - 'scripts/**'
      - 'skills/**'
  schedule:
    - cron: '23 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cli-compat-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  claude-code:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install current Claude Code CLI
        run: npm install --global @anthropic-ai/claude-code@latest
      - name: Run real Claude Code adapter check
        env:
          CLAUDE_REAL_CHECK: '1'
        run: bash scripts/check-claude-adapter.sh

  codex:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install current Codex CLI
        run: npm install --global @openai/codex@latest
      - name: Run real Codex CLI discovery test
        run: bash scripts/test-codex-cli-e2e.sh

  droid:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install current Droid CLI
        run: npm install --global droid@latest
      - name: Run Droid adapter checks
        run: bash scripts/check-droid-adapter.sh
      - name: Verify real Droid marketplace discovery
        run: |
          test_home="$(mktemp -d)"
          HOME="$test_home" droid plugin marketplace add "$GITHUB_WORKSPACE"
          HOME="$test_home" droid plugin marketplace list | grep -q 'oh-story-claudecode.*14 plugins'
